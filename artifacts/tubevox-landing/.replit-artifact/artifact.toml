kind = "web"
previewPath = "/"
title = "YTScraper Landing Page"
version = "1.0.0"
id = "artifacts/ytscraper-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22696

[services.development]
run = "pnpm --filter @workspace/ytscraper-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ytscraper-landing", "run", "build" ]
publicDir = "artifacts/ytscraper-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22696"
BASE_PATH = "/"
